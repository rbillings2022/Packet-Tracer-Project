<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign In</title>

		<link href="../styles/style.css" rel="stylesheet">
		<link rel="icon" href="../../assets/icons/lightning.png" type="image/x-icon">

		<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

		<script src="../../assets/scripts/script.js" defer></script>
	</head>
	<style>
		body, html {
			margin: 0;
			padding: 0;
			height: 100%;
			width: 100%;
			overflow: hidden; /* Prevents scrollbars on the login page */
		}
	</style>
	<body>
		<div class="login-container">
			<div class="login-card">
				<div class="login-header">
					<img src="../../assets/icons/lightning.png" alt="Logo" class="login-logo">
					<h1 style="margin-bottom:10px;">E-Tracer</h1>
					<p>Enter your credentials to access the Dashboard</p>
				</div>

				<form action="index.html" class="login-form">
					<div class="input-group">
						<label for="email">Email Address</label>
						<input type="email" id="email" required>
					</div>

					<div class="input-group">
						<label for="password">Password</label>
						<input type="password" id="password" required>
					</div>

					<button type="submit" class="login-btn">Sign In</button>

					<div class="login-footer">
						<a href="../../index.html">← Back to Dashboard</a>
					</div>
				</form>
			</div>
		</div>
	</body>
</html>
